<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Roleta - VipTech</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle, #ffffff 0%, #00d2ff 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            color: #fff;
        }

        .header-logo {
            margin-bottom: 30px;
            text-align: center;
            z-index: 2;
        }

        .header-logo img {
            max-width: 250px;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3));
        }

        .header-logo p {
            margin-top: 10px;
            font-size: 16px;
            font-weight: bold;
            color: #1e293b;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }

        /* Container da Roleta */
        .roulette-container {
            position: relative;
            width: 90vw;
            max-width: 500px;
            height: 90vw;
            max-height: 500px;
            margin-bottom: 20px;
        }

        /* Marcador Superior */
        .pointer {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 22px solid transparent;
            border-right: 22px solid transparent;
            border-top: 45px solid #1e293b;
            z-index: 10;
            filter: drop-shadow(0px 6px 4px rgba(0,0,0,0.4));
        }
        
        .pointer::after {
            content: '';
            position: absolute;
            top: -42px;
            left: -12px;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 25px solid #00d2ff;
        }

        /* O disco da roleta */
        .wheel {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #1e293b;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4), inset 0 0 25px rgba(0, 0, 0, 0.5);
            touch-action: none;
            cursor: grab;
            overflow: hidden;
            background: #fff;
        }

        .wheel:active {
            cursor: grabbing;
        }

        /* Centro da Roleta */
        .center-hub {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 90px;
            background: #0f172a;
            border: 5px solid #00d2ff;
            border-radius: 50%;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.6), inset 0 0 15px rgba(0, 210, 255, 0.4);
            pointer-events: none;
        }

        .center-hub span {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ffffff 0%, #00d2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeIn 0.5s ease-in-out;
        }

        /* Rótulos */
        .wheel-label {
            position: absolute;
            left: 50%;
            top: 50%;
            transform-origin: 0 center;
            width: 46%; 
            text-align: right;
            padding-right: 25px;
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.9), 0px 0px 3px rgba(0, 0, 0, 1);
            white-space: nowrap;
            margin-top: -12px; 
        }

        /* ================= MODAL DE COMEMORAÇÃO ================= */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 40px 30px;
            border-radius: 20px;
            border: 2px solid #00d2ff;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.5);
            transform: scale(0.7);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 85%;
            max-width: 400px;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-content h2 {
            font-size: 28px;
            color: #00d2ff;
            margin-bottom: 15px;
        }

        .modal-content p {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .modal-content h3 {
            font-size: 32px;
            color: #fff;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            word-wrap: break-word;
        }

        .btn-fechar {
            background: linear-gradient(90deg, #00d2ff, #0066ff);
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 102, 255, 0.4);
            transition: transform 0.2s;
        }

        .btn-fechar:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <audio id="winSound" src="./parabensCarsudo.ogg" preload="auto"></audio>

    <div class="header-logo">
        <img src="https://www.viptech.com.br/img/logo_menu_viptech.png" alt="Viptech">
        <p>Gire com o dedo para sortear!</p>
    </div>

    <div class="roulette-container">
        <div class="pointer"></div>
        <div class="center-hub"><span>VIPTECH</span></div>
        <div class="wheel" id="wheel"></div>
    </div>

    <div class="modal-overlay" id="winModal">
        <div class="modal-content">
            <h2>🎉 PARABÉNS! 🎉</h2>
            <p>O prêmio sorteado foi:</p>
            <h3 id="prizeText">Premio X</h3>
            <button class="btn-fechar" onclick="fecharModal()">RESGATAR PRÊMIO</button>
        </div>
    </div>

    <script>
        const valoresRoleta = [
            "Bala",
            "Bombom",
            "Figurinha",
            "Bala",
            "Desconto 10%",
            "Bombom",
            "Figurinha",
            "Copo",
        ];

        const wheel = document.getElementById('wheel');
        const winModal = document.getElementById('winModal');
        const prizeText = document.getElementById('prizeText');
        const winAudio = document.getElementById('winSound');
        
        let isDragging = false;
        let startAngle = 0;
        let currentRotation = 0;
        let lastAngle = 0;
        let velocity = 0;
        let lastTime = Date.now();
        let animationFrameId = null;
        let maxVelocityDuringSpin = 0; 
        
        const sliceAngle = 360 / valoresRoleta.length;

        // --- LÓGICA DO GANHADOR ---
        function checkWinner() {
            if (maxVelocityDuringSpin > 0.5) {
                let normalizedRotation = ((currentRotation % 360) + 360) % 360;
                let pointerAngle = (360 - normalizedRotation) % 360;
                let winningIndex = Math.floor(pointerAngle / sliceAngle);
                let premio = valoresRoleta[winningIndex];
                
                mostrarComemoracao(premio);
            }
            maxVelocityDuringSpin = 0; 
        }

        function mostrarComemoracao(premio) {
            prizeText.innerText = premio;
            winModal.classList.add('active');
            
            winAudio.currentTime = 0;
            winAudio.volume = 0.6;
            winAudio.play().catch(e => console.log("Áudio bloqueado pelo navegador"));
        }

        function fecharModal() {
            winModal.classList.remove('active');
            winAudio.pause();
        }

        // --- CONSTRUÇÃO DA ROLETA ---
        function generateRandomColors(total) {
            const colors = [];
            for (let i = 0; i < total; i++) {
                const hue = Math.floor((360 / total) * i + (Math.random() * 20));
                colors.push(`hsl(${hue}, 80%, 40%)`);
            }
            return colors;
        }

        function setupWheel() {
            const colors = generateRandomColors(valoresRoleta.length);
            
            let gradientString = "conic-gradient(";
            colors.forEach((color, index) => {
                const startDeg = index * sliceAngle;
                const endDeg = (index + 1) * sliceAngle;
                gradientString += `${color} ${startDeg}deg ${endDeg}deg`;
                if (index < valoresRoleta.length - 1) gradientString += ", ";
            });
            gradientString += ")";
            wheel.style.background = gradientString;

            wheel.innerHTML = "";
            valoresRoleta.forEach((texto, index) => {
                const labelAngle = (index * sliceAngle) + (sliceAngle / 2);
                const labelEl = document.createElement('div');
                labelEl.className = 'wheel-label';
                labelEl.innerText = texto;
                labelEl.style.transform = `rotate(${labelAngle - 90}deg)`;
                wheel.appendChild(labelEl);
            });
        }

        // --- MOTOR FÍSICO DO TOQUE ---
        function getAngle(clientX, clientY) {
            const rect = wheel.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            return Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI);
        }

        wheel.addEventListener('pointerdown', (e) => {
            isDragging = true;
            velocity = 0;
            maxVelocityDuringSpin = 0;
            cancelAnimationFrame(animationFrameId);

            const angle = getAngle(e.clientX, e.clientY);
            startAngle = angle - currentRotation;
            lastAngle = angle;
            lastTime = Date.now();
            
            wheel.setPointerCapture(e.pointerId);
        });

        wheel.addEventListener('pointermove', (e) => {
            if (!isDragging) return;

            const angle = getAngle(e.clientX, e.clientY);
            const now = Date.now();
            const dt = now - lastTime;

            if (dt > 0) {
                let deltaAngle = angle - lastAngle;
                if (deltaAngle > 180) deltaAngle -= 360;
                if (deltaAngle < -180) deltaAngle += 360;
                
                velocity = deltaAngle / dt;
                
                if (Math.abs(velocity) > maxVelocityDuringSpin) {
                    maxVelocityDuringSpin = Math.abs(velocity);
                }
            }

            currentRotation = angle - startAngle;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            lastAngle = angle;
            lastTime = now;
        });

        wheel.addEventListener('pointerup', (e) => {
            if (!isDragging) return;
            isDragging = false;
            wheel.releasePointerCapture(e.pointerId);

            if (Date.now() - lastTime > 100) {
                velocity = 0; 
                checkWinner(); 
            } else {
                // MULTIPLICADOR DE SENSIBILIDADE: Aumenta a força final do dedo em 2.5x
                velocity *= 2.5; 
                applyInertia(); 
            }
        });

        wheel.addEventListener('pointercancel', () => {
            isDragging = false;
        });

        function applyInertia() {
            // Condição de parada (quando a roleta fica bem devagar, ela trava e anuncia o ganhador)
            if (Math.abs(velocity) < 0.002) {
                velocity = 0;
                checkWinner(); 
                return;
            }

            // MULTIPLICADOR DE VELOCIDADE: Faz ela girar visualmente muito mais rápido
            currentRotation += velocity * 25; 
            wheel.style.transform = `rotate(${currentRotation}deg)`;
            
            // ATRITO: Reduzido para 0.985 (ela gira mais solta e por mais tempo)
            velocity *= 0.985; 
            
            animationFrameId = requestAnimationFrame(applyInertia);
        }

        setupWheel();
    </script>
</body>
</html>
